<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>하모니렌트카 구입형 상품 설명서</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:#f7f9ff;color:#191f2e;min-height:100vh}
header{background:#fff;border-bottom:1px solid #e8edf5;padding:14px 28px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(21,101,192,.06)}
.logo-emoji{font-size:28px;flex-shrink:0;line-height:1}
.logo-info h1{font-size:16px;font-weight:700;color:#1565c0}
.header-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.kakao-btn{background:#FEE500;color:#3C1E1E;border:none;border-radius:12px;padding:9px 14px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;white-space:nowrap;text-decoration:none;display:inline-flex;align-items:center;transition:background .15s}
.kakao-btn:hover{background:#f5dc00}
.home-btn{background:#f0f4fc;color:#1565c0;border:none;border-radius:12px;padding:9px 14px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:'Noto Sans KR',sans-serif;}
.home-btn:hover{background:#dce8fa}
@media(max-width:620px){.inq-text{display:none!important}header{padding:14px 16px!important}}

.page{max-width:780px;margin:0 auto;padding:40px 20px 60px}

/* 인트로 */
.intro{text-align:center;margin-bottom:44px}
.intro h2{font-size:26px;font-weight:900;color:#191f2e;margin-bottom:10px;line-height:1.5}
.h2-accent{color:#1565c0}
.intro p{font-size:15px;color:#6b7a99;line-height:1.8}
.intro-emoji-wrap{position:relative;display:flex;align-items:center;justify-content:center;margin-bottom:20px;height:72px}
.emoji-main{font-size:52px;display:inline-block;animation:mainBounce 2.4s ease-in-out infinite;}
.emoji-float{font-size:28px;display:inline-block;position:absolute;opacity:0;}
#ef1{left:calc(50% - 72px);animation:floatLeft 3.6s ease-in-out infinite 0.6s;}
#ef2{right:calc(50% - 72px);animation:floatRight 3.6s ease-in-out infinite 1.2s;}
@keyframes mainBounce{0%,100%{transform:translateY(0) scale(1);}30%{transform:translateY(-10px) scale(1.08);}60%{transform:translateY(-4px) scale(1.03);}}
@keyframes floatLeft{0%{opacity:0;transform:translate(-8px,6px) scale(.7);}20%{opacity:1;transform:translate(0,0) scale(1);}70%{opacity:1;transform:translate(-4px,-6px) scale(1);}100%{opacity:0;transform:translate(-12px,-10px) scale(.7);}}
@keyframes floatRight{0%{opacity:0;transform:translate(8px,6px) scale(.7);}20%{opacity:1;transform:translate(0,0) scale(1);}70%{opacity:1;transform:translate(4px,-6px) scale(1);}100%{opacity:0;transform:translate(12px,-10px) scale(.7);}}

/* ZERO 카드 */
.zero-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:36px}
.zero-card{background:#fff;border:1px solid #e0e8f7;border-radius:14px;padding:1rem;text-align:center}
.zero-num{font-size:30px;font-weight:900;color:#1565c0;line-height:1;margin-bottom:4px}
.zero-title{font-size:13px;font-weight:700;color:#191f2e;margin-bottom:3px}
.zero-desc{font-size:11px;color:#6b7280;line-height:1.5}
@media(max-width:480px){.zero-grid{grid-template-columns:1fr}}

/* 검색 */
.search-box{position:relative;margin-bottom:36px}
.search-box input{width:100%;padding:18px 56px 18px 22px;border:2px solid #e0e8f5;border-radius:18px;font-size:16px;font-family:'Noto Sans KR',sans-serif;background:#fff;color:#191f2e;outline:none;transition:all .2s;box-shadow:0 2px 12px rgba(21,101,192,.06)}
.search-box input:focus{border-color:#1565c0;box-shadow:0 0 0 4px rgba(21,101,192,.1)}
.search-box input::placeholder{color:#b0baca}
.search-box .search-ico{position:absolute;right:18px;top:50%;transform:translateY(-50%);font-size:22px;pointer-events:none}

/* 카테고리 */
.section-label{font-size:13px;font-weight:700;color:#8a94a6;letter-spacing:.5px;margin-bottom:14px}
.cat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:14px;margin-bottom:48px}
.cat-card{background:#fff;border:2px solid #e8edf5;border-radius:20px;padding:26px 16px;cursor:pointer;transition:all .2s;text-align:center;user-select:none}
.cat-card:hover{border-color:#1565c0;box-shadow:0 8px 24px rgba(21,101,192,.13);transform:translateY(-3px)}
.cat-card:active{transform:scale(.97)}
.cat-card .ico{font-size:34px;margin-bottom:12px}
.cat-card .name{font-size:15px;font-weight:700;color:#191f2e;margin-bottom:4px}
.cat-card .cnt{font-size:12px;color:#8a94a6}

/* 결과 */
.result-area{display:none}
.result-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.result-header h3{font-size:17px;font-weight:700}
.result-back{background:#f0f4fc;border:none;border-radius:10px;padding:8px 16px;font-size:13px;font-weight:700;color:#1565c0;cursor:pointer;font-family:'Noto Sans KR',sans-serif}
.result-back:hover{background:#dce8fa}
.result-card{background:#fff;border:2px solid #e8edf5;border-radius:16px;padding:18px 20px;margin-bottom:10px;cursor:pointer;transition:all .18s}
.result-card:hover{border-color:#1565c0;box-shadow:0 4px 16px rgba(21,101,192,.1)}
.result-card-top{display:flex;align-items:center;gap:10px;margin-bottom:6px;flex-wrap:wrap}
.result-card-title{font-size:15px;font-weight:700;color:#191f2e}
.result-card-desc{font-size:13px;color:#6b7a99;line-height:1.6}
.empty-result{text-align:center;padding:48px 0;color:#8a94a6}
.empty-result .ico{font-size:36px;margin-bottom:12px}

/* 배지 */
.badge{font-size:11px;padding:3px 10px;border-radius:20px;border:1px solid;font-weight:600;white-space:nowrap}
.b-basic{background:#e3f2fd;color:#0d47a1;border-color:#90caf9}
.b-condition{background:#e6f4ee;color:#0a7a4e;border-color:#b2dfcc}
.b-rule{background:#fdecea;color:#b02020;border-color:#f5bcb8}
.b-estimate{background:#ede9fb;color:#5020a0;border-color:#c9bdf5}
.b-process{background:#e0f5f9;color:#006080;border-color:#a0dced}

/* 팝업 */
.overlay{display:none;position:fixed;inset:0;background:rgba(25,31,46,.35);z-index:400;backdrop-filter:blur(6px);align-items:center;justify-content:center;padding:20px}
.overlay.open{display:flex}
.popup{background:#fff;border-radius:24px;width:100%;max-width:600px;max-height:88vh;overflow-y:auto;box-shadow:0 24px 64px rgba(21,101,192,.18);animation:popIn .2s ease}
@keyframes popIn{from{opacity:0;transform:scale(.93)}to{opacity:1;transform:scale(1)}}
.popup-top{display:flex;align-items:flex-start;justify-content:space-between;padding:26px 26px 18px;position:sticky;top:0;background:#fff;border-radius:24px 24px 0 0;border-bottom:1px solid #f0f4fc;z-index:1}
.popup-top-left .badge{margin-bottom:8px;display:inline-block}
.popup-top-left h2{font-size:20px;font-weight:900;color:#191f2e;line-height:1.35}
.popup-close{background:#f0f4fc;border:none;width:36px;height:36px;border-radius:50%;font-size:18px;cursor:pointer;color:#6b7a99;flex-shrink:0;margin-left:10px;transition:all .15s;margin-top:2px}
.popup-close:hover{background:#dce8fa;color:#1565c0}
.popup-body{padding:20px 26px 28px}

/* 팝업 내부 요소 */
.popup-desc{font-size:14px;color:#4a5570;line-height:1.8;margin-bottom:20px;background:#f7f9ff;border-radius:12px;padding:14px 16px}
.block{margin-bottom:22px}
.block-label{font-size:12px;font-weight:700;color:#1565c0;letter-spacing:.5px;margin-bottom:10px;text-transform:uppercase}
.info-table{width:100%;border-collapse:collapse;font-size:13px;border-radius:12px;overflow:hidden}
.info-table th{text-align:center;padding:10px 12px;background:#1a3a6e;color:#fff;font-weight:700;font-size:12px;border-bottom:2px solid #142f5a}
.info-table td{padding:10px 12px;border-bottom:1px solid #f0f4fc;color:#191f2e;vertical-align:top;white-space:pre-line;text-align:center}
.info-table td.td-left{text-align:left}
.info-table tr:last-child td{border-bottom:none}
.info-table tr:hover td{background:#f7f9ff}
.info-table td strong{color:#1565c0;font-weight:700}
.rule-row{display:flex;gap:12px;align-items:flex-start;padding:10px 0;border-bottom:1px solid #f0f4fc;font-size:14px;color:#4a5570;line-height:1.7}
.rule-row:last-child{border-bottom:none}
.rule-ico{font-size:16px;flex-shrink:0;margin-top:2px}

/* 견적 스텝 */
.est-alert{background:#fff5f5;border:1px solid #fca5a5;border-radius:10px;padding:12px 16px;margin-bottom:16px;font-size:13px;color:#b91c1c;line-height:1.7;font-weight:500}
.est-step{display:flex;gap:14px;align-items:flex-start;background:#f8faff;border:1px solid #e0e8f7;border-radius:12px;padding:14px 16px;margin-bottom:10px}
.est-num{background:#1565c0;color:#fff;font-size:12px;font-weight:700;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.est-title{font-size:14px;font-weight:700;color:#191f2e;margin-bottom:4px}
.est-desc{font-size:13px;color:#4a5570;line-height:1.7}
.est-link{display:inline-flex;align-items:center;gap:5px;margin-top:8px;background:#fef3c7;color:#92400e;font-size:12px;font-weight:700;padding:5px 12px;border-radius:8px;border:1px solid #fde68a;text-decoration:none;transition:background .15s}
.est-link:hover{background:#fde68a}

/* 면허/휴대폰 카드 */
.license-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.license-card{background:#f8faff;border:1.5px solid #e0e8f7;border-radius:14px;padding:16px}
.license-card-tag{font-size:11px;font-weight:700;color:#6b7a99;margin-bottom:6px;letter-spacing:.5px}
.license-card-title{font-size:15px;font-weight:900;color:#191f2e;line-height:1.4;margin-bottom:8px}
.license-card-desc{font-size:12px;color:#6b7a99;line-height:1.6;border-top:1px solid #e0e8f7;padding-top:8px}
.license-card-ico{font-size:26px;margin-bottom:8px}
@media(max-width:440px){.license-grid{grid-template-columns:1fr}}

/* 서류 카드 */
.doc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.doc-card{background:#f8faff;border:1.5px solid #e0e8f7;border-radius:14px;padding:16px}
.doc-card-title{font-size:13px;font-weight:700;color:#191f2e;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.doc-list{list-style:none;padding:0}
.doc-list li{font-size:12px;color:#4a5570;line-height:1.8;padding-left:10px;position:relative}
.doc-list li::before{content:'•';position:absolute;left:0;color:#1565c0}
@media(max-width:480px){.doc-grid{grid-template-columns:1fr}}

/* 승계 카드 */
.succ-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.succ-card{background:#f8faff;border:1.5px solid #e0e8f7;border-radius:14px;padding:16px}
.succ-card-tag{font-size:11px;color:#8a94a6;font-weight:700;margin-bottom:4px}
.succ-card-title{font-size:16px;font-weight:900;color:#1565c0;margin-bottom:4px}
.succ-card-sub{font-size:12px;color:#6b7a99}
.succ-warn{background:#fef2f2;border:1px solid #fca5a5;border-radius:10px;padding:12px 16px;font-size:13px;color:#b91c1c;line-height:1.7;display:flex;align-items:flex-start;gap:10px}
.succ-warn-ico{font-size:20px;flex-shrink:0}

/* 푸터 */
footer{text-align:center;margin-top:2.5rem;font-size:11px;color:#9ca3af;padding-bottom:1rem}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:#f0f4fc}
::-webkit-scrollbar-thumb{background:#c5d8f7;border-radius:10px}
</style>
</head>
<body>
<header>
  <div class="logo-emoji">🚗</div>
  <div class="logo-info">
    <h1>구입형 상품 설명서</h1>
  </div>
  <div class="header-right">
    <span class="inq-text" style="font-size:13px;color:#8a94a6;font-weight:500;white-space:nowrap;">찾으시는 내용이 없다면?</span>
    <a class="kakao-btn" href="http://pf.kakao.com/_IrIxjG" target="_blank" rel="noopener">💬 카카오톡 문의</a>
    <button class="home-btn" onclick="goHome()">🏠 홈으로</button>
  </div>
</header>

<div class="page">
  <div class="intro">
    <div class="intro-emoji-wrap">
      <span class="emoji-float" id="ef1">🚗</span>
      <span class="emoji-main" id="em">🙋</span>
      <span class="emoji-float" id="ef2">💬</span>
    </div>
    <h2>구입형 상품에 대해<br>궁금하신가요?<br><span class="h2-accent">무엇이든 물어보세요!</span></h2>
    <p>상품에 대한 소개부터 위약금까지!<br>필요한 내용을 검색하거나 아래 카테고리를 눌러 확인해 보세요</p>
  </div>

  <div class="zero-grid">
    <div class="zero-card">
      <div class="zero-num">0</div>
      <div class="zero-title">신용심사 ZERO</div>
      <div class="zero-desc">저신용자·개인회생자 포함<br>신용등급 무관</div>
    </div>
    <div class="zero-card">
      <div class="zero-num">0</div>
      <div class="zero-title">금리거품 ZERO</div>
      <div class="zero-desc">파격적인 9% 금리</div>
    </div>
    <div class="zero-card">
      <div class="zero-num">0</div>
      <div class="zero-title">만기인수비 ZERO</div>
      <div class="zero-desc">렌트 만기 후 추가비용 없이<br>고객 명의 이전</div>
    </div>
  </div>

  <div class="search-box">
    <input id="search-input" type="text" placeholder="예) 보증금, 위약금, 취득세, 미납, 승계..." oninput="onSearch(this.value)">
    <span class="search-ico">🔍</span>
  </div>

  <div id="main-view">
    <div class="section-label">카테고리를 선택하세요</div>
    <div class="cat-grid" id="cat-grid"></div>
  </div>

  <div class="result-area" id="result-area">
    <div class="result-header">
      <h3 id="result-title">검색 결과</h3>
      <button class="result-back" onclick="goBack()">← 이전으로</button>
    </div>
    <div id="result-list"></div>
  </div>
</div>

<footer>ⓒ 하모니렌트카 — 대외비</footer>

<div class="overlay" id="overlay" onclick="closePopup(event)">
  <div class="popup" id="popup">
    <div class="popup-top">
      <div class="popup-top-left">
        <div class="badge" id="popup-badge"></div>
        <h2 id="popup-title"></h2>
      </div>
      <button class="popup-close" onclick="closePopupBtn()">✕</button>
    </div>
    <div class="popup-body" id="popup-body"></div>
  </div>
</div>

<script>
const CATS=[
  {key:'basic',    ico:'📖', name:'알기쉬운 상품 소개', desc:'구입형 개요·계약기간·자격'},
  {key:'condition',ico:'💰', name:'보증금 및 비용 안내', desc:'보증금·납부방식·이전비용'},
  {key:'rule',     ico:'⚠️', name:'주의 규정',          desc:'미납·해지·운전자 범위'},
  {key:'estimate', ico:'🧮', name:'견적 내는 법',        desc:'산출 기준·출고 원칙'},
  {key:'process',  ico:'📋', name:'계약 진행 및 관리',  desc:'대상별 서류·승계 조건'},
];

const BC={basic:'b-basic',condition:'b-condition',rule:'b-rule',estimate:'b-estimate',process:'b-process'};
const BN={basic:'알기쉬운 상품 소개',condition:'보증금 및 비용 안내',rule:'주의 규정',estimate:'견적 내는 법',process:'계약 진행 및 관리'};

const DATA=[

  /* ── 알기쉬운 상품 소개 ── */
  {id:1, type:'basic', title:'구입형 상품이란?',
   tags:['구입형','렌트','상품설명','신용심사','자산','반납형','할부'],
   desc:'매달 내는 렌트료가 곧 내 자산이 되는 상품이에요.',
   detail:{type:'product_intro'}},

  {id:2, type:'basic', title:'계약기간',
   tags:['계약기간','48개월','60개월','4년','5년'],
   desc:'48개월 또는 60개월 중 선택할 수 있어요.',
   detail:{rules:[
     {ico:'📅', text:'48개월(4년) 또는 60개월(5년) 선택 가능합니다.'},
   ]}},

  {id:3, type:'basic', title:'계약 가능 조건',
   tags:['연령','나이','만26세','만69세','법인','사업자','개인','개인회생','면허','휴대폰','본인명의'],
   desc:'계약 가능 연령, 면허 조건, 휴대폰 조건을 확인하세요.',
   detail:{type:'contract_condition'}},

  {id:4, type:'basic', title:'운전자 범위',
   tags:['운전자','범위','가족','직원','임직원','법인특약','사실혼'],
   desc:'계약 유형별로 운전 가능한 사람이 달라요.',
   detail:{table:{headers:['계약 유형','운전 가능한 사람'],rows:[
     ['개인','본인, 직계가족 및 법률상 배우자 (사실혼 배우자 제외)'],
     ['개인사업자','대표, 직계가족 및 법률상 배우자 (사실혼 배우자 제외), 직원'],
     ['법인','대표 및 임직원'],
   ]},rules:[
     {ico:'📋', text:'법인 임직원 한정특약 — 가입 선택은 가능하나, 미가입 시 비용처리 불가합니다.'},
   ]}},

  /* ── 계약 조건 ── */
  {id:5, type:'condition', title:'보증금 옵션',
   tags:['보증금','10%','15%','20%','잔금','외제차','BMW','벤츠','선납금'],
   desc:'보증금 비율에 따라 만기 잔금 여부가 달라져요.',
   detail:{table:{headers:['보증금','만기 잔금','내용'],rows:[
     ['10%','있음 (10%)','만기에 차량가의 10% 추가 납부 후 인수'],
     ['15%','있음 (5%)', '만기에 차량가의 5% 추가 납부 후 인수'],
     ['20%','없음',      '만기 시 추가 납부 없이 바로 인수'],
   ]},rules:[
     {ico:'⚠️', text:'외제차(BMW·벤츠)의 경우 — 보증금 20% + 선납금 10% 조건으로만 진행 가능합니다.'},
   ]}},

  {id:6, type:'condition', title:'보증금 분납',
   tags:['보증금','분납','2회차','시동제어'],
   desc:'보증금은 분납이 가능하지만 조건을 반드시 안내해야 해요.',

function buildCats(){
  const grid=document.getElementById('cat-grid');
  grid.innerHTML='';
  CATS.forEach(c=>{
    const cnt=DATA.filter(d=>d.type===c.key).length;
    const el=document.createElement('div');
    el.className='cat-card';
    el.innerHTML=`<div class="ico">${c.ico}</div><div class="name">${c.name}</div><div class="cnt">${cnt}개 항목</div>`;
    el.onclick=()=>showCat(c.key,c.name);
    grid.appendChild(el);
  });
}

function showCat(type,name){showResults(DATA.filter(d=>d.type===type),name)}

function onSearch(q){
  if(!q.trim()){goHome();return}
  const kw=q.trim().toLowerCase();
  showResults(DATA.filter(d=>
    d.title.toLowerCase().includes(kw)||
    d.desc.toLowerCase().includes(kw)||
    (d.tags&&d.tags.some(t=>t.toLowerCase().includes(kw)))
  ),`"${q}" 검색 결과`);
}

function showResults(list,title){
  document.getElementById('main-view').style.display='none';
  const area=document.getElementById('result-area');
  area.style.display='block';
  document.getElementById('result-title').textContent=title;
  const rl=document.getElementById('result-list');
  if(!list.length){
    rl.innerHTML='<div class="empty-result"><div class="ico">🔍</div><p>검색 결과가 없어요.<br>다른 키워드로 찾아보세요!</p></div>';
    return;
  }
  rl.innerHTML=list.map(d=>`
    <div class="result-card" onclick="openPopup(${d.id})">
      <div class="result-card-top">
        <div class="result-card-title">${d.title}</div>
        <span class="badge ${BC[d.type]}">${BN[d.type]}</span>
      </div>
      <div class="result-card-desc">${d.desc}</div>
    </div>`).join('');
}

function goHome(){
  document.getElementById('search-input').value='';
  document.getElementById('main-view').style.display='block';
  document.getElementById('result-area').style.display='none';
  window.scrollTo({top:0,behavior:'smooth'});
}
function goBack(){goHome();}

function openPopup(id){
  const d=DATA.find(x=>x.id===id);
  if(!d)return;
  document.getElementById('popup-badge').className='badge '+BC[d.type];
  document.getElementById('popup-badge').textContent=BN[d.type];
  document.getElementById('popup-title').textContent=d.title;
  document.getElementById('popup-body').innerHTML=buildPopupHTML(d);
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function closePopup(e){if(e.target===document.getElementById('overlay'))closePopupBtn()}
function closePopupBtn(){document.getElementById('overlay').classList.remove('open');document.body.style.overflow=''}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closePopupBtn()});
